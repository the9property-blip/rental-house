// ★ FIX: ใช้ lh3.googleusercontent.com แทน drive.google.com/thumbnail
// URL primary และ fallback — ถ้าตัวแรกโหลดไม่ได้ จะลองตัวที่สอง
function photoUrl(id, size) {
  return 'https://lh3.googleusercontent.com/d/' + id + '=w' + (size || 800);
}
function photoUrlFallback(id) {
  return 'https://drive.usercontent.google.com/download?id=' + id + '&export=view';
}

var allData    = [];
var activeType = 'all';

window.onload = function() { loadData(false); };

// ─── LOAD DATA ─────────────────────────────────────────────
// manual = true  → ส่ง ?refresh=1 บังคับ scan รูปใหม่บน server
// manual = false → ใช้ cache (เร็วกว่า)
function loadData(manual) {
  var btn = document.getElementById('btnRefresh');
  btn.classList.add('spinning');
  btn.disabled = true;
  showLoading();

  var url = SCRIPT_URL + (manual ? '?refresh=1' : '');
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      btn.classList.remove('spinning');
      btn.disabled = false;
      if (json.error || !json.ok) { showError(json.error || json.msg || 'ไม่ทราบสาเหตุ'); return; }
      allData = json.data || [];
      applyFilters();
      if (manual) showToast('✅ โหลดข้อมูลสำเร็จ ' + allData.length + ' รายการ');
    })
    .catch(function(err) {
      btn.classList.remove('spinning');
      btn.disabled = false;
      showError('เชื่อมต่อไม่ได้: ' + err.message);
    });
}

// ─── FILTER & SORT ─────────────────────────────────────────
function setType(val, btn) {
  activeType = val;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  var search   = document.getElementById('searchInput').value.toLowerCase().trim();
  var pet      = document.getElementById('selPet').value;
  var priceMin = parseInt(document.getElementById('selMin').value);
  var priceMax = parseInt(document.getElementById('selMax').value);
  var bed      = document.getElementById('selBed').value;
  var sort     = document.getElementById('selSort').value;

  var filtered = allData.filter(function(p) {
    if (activeType !== 'all' && p.type !== activeType) return false;
    if (p.price > 0 && (p.price < priceMin || p.price > priceMax)) return false;
    if (pet === 'yes' && !(p.pet||'').includes('รับ'))  return false;
    if (pet === 'no'  && !(p.pet||'').includes('ไม่'))  return false;
    if (bed !== 'all') {
      var br = parseInt(p.bedroom) || 0;
      if (bed === '4' && br < 4) return false;
      if (bed !== '4' && br !== parseInt(bed)) return false;
    }
    if (search) {
      var hay = ((p.code||'') + ' ' + (p.project||'') + ' ' + (p.location||'') + ' ' + (p.type||'')).toLowerCase();
      if (hay.indexOf(search) === -1) return false;
    }
    return true;
  });

  filtered.sort(function(a, b) {
    if (sort === 'price_asc')  return (a.price||0) - (b.price||0);
    if (sort === 'price_desc') return (b.price||0) - (a.price||0);
    if (sort === 'name_asc')   return (a.project||'').localeCompare(b.project||'');
    if (sort === 'bed_asc')    return (parseInt(a.bedroom)||0) - (parseInt(b.bedroom)||0);
    return 0;
  });

  showGrid(filtered);
  document.getElementById('countDisplay').textContent = filtered.length;
}

// ─── HELPERS ───────────────────────────────────────────────
function badgeClass(t) {
  if (t === 'พูลวิลล่า')   return 'badge-villa';
  if (t === 'คอนโด')       return 'badge-condo';
  if (t === 'ทาวน์เฮ้าส์') return 'badge-town';
  return 'badge-single';
}
function petClass(p) {
  if (!p || p.includes('ไม่')) return 'tag-pet-no';
  if (p === 'รับ')              return 'tag-pet-yes';
  return 'tag-pet-other';
}
function petLabel(p) {
  if (!p || p.includes('ไม่')) return '❌ ไม่รับสัตว์';
  if (p === 'รับ')              return '✅ รับสัตว์เลี้ยง';
  return '🐾 ' + p;
}
function typeEmoji(t) {
  var m = {'บ้านเดี่ยว':'🏡','ทาวน์เฮ้าส์':'🏘','คอนโด':'🏢','พูลวิลล่า':'🏊','บ้าน':'🏠'};
  return (m[t]||'🏠') + ' ' + (t||'–');
}
function fmtPrice(p) {
  if (!p) return '–';
  return Number(p).toLocaleString('th-TH');
}

// ★ FIX: ถ้ารูปโหลดไม่ได้ ลอง fallback URL ก่อนค่อยขึ้น placeholder
function onPhotoError(img, fallbackId) {
  if (!img.dataset.fallbackTried && fallbackId) {
    img.dataset.fallbackTried = '1';
    img.src = photoUrlFallback(fallbackId);
    return;
  }
  // ลองทั้งสองแล้ว — แสดง placeholder
  var parent = img.parentElement;
  parent.innerHTML = '<div class="card-photo-placeholder"><span class="ph-icon">🏠</span><span>ไม่มีรูปภาพ</span></div>';
}

// ─── RENDER GRID ───────────────────────────────────────────
function showGrid(data) {
  var g = document.getElementById('grid');
  if (data.length === 0 && allData.length > 0) {
    g.innerHTML = '<div class="state-box"><div class="icon">🔍</div><h3>ไม่พบรายการที่ตรงกัน</h3><p>ลองเปลี่ยนตัวกรองหรือค้นหาใหม่</p></div>';
    return;
  }
  if (data.length === 0) { g.innerHTML = ''; return; }

  g.innerHTML = data.map(function(p) {
    var pj = JSON.stringify(p).replace(/"/g, '&quot;');

    // ★ NEW: รูปบนการ์ด
    var photoBlock = p.thumb
      ? '<div class="card-photo"><img src="' + photoUrl(p.thumb, 400) + '" loading="lazy" alt="' + (p.project||'') + '" onerror="onPhotoError(this,\'' + p.thumb + '\')"></div>'
      : '<div class="card-photo"><div class="card-photo-placeholder"><span class="ph-icon">🏠</span><span>ยังไม่มีรูป</span></div></div>';

    return '<div class="card" onclick=\'openDetail(' + pj + ')\'>' +
      photoBlock +
      '<div class="card-header">' +
        '<div class="card-code">' + (p.code||'') + '</div>' +
        '<div class="card-project">' + (p.project||'ไม่ระบุโครงการ') + '</div>' +
        '<div class="card-location">' + (p.location||'ไม่ระบุทำเล') + '</div>' +
        '<span class="card-type-badge ' + badgeClass(p.type) + '">' + (p.type||'') + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="price">฿' + fmtPrice(p.price) + ' <span>บาท/เดือน</span></div>' +
        '<div class="card-tags">' +
          (p.bedroom  ? '<span class="tag">🛏 ' + p.bedroom  + ' นอน</span>' : '') +
          (p.bathroom ? '<span class="tag">🚿 ' + p.bathroom + ' น้ำ</span>'  : '') +
          '<span class="tag ' + petClass(p.pet) + '">' + petLabel(p.pet) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<button class="btn-detail" onclick=\'event.stopPropagation();openDetail(' + pj + ')\'>📋 รายละเอียด</button>' +
        '<button class="btn-contact-card" onclick="event.stopPropagation();window.location.href=\'tel:' + BROKER_PHONE + '\'">📞 สอบถาม</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function showLoading() {
  document.getElementById('grid').innerHTML =
    '<div class="state-box"><div class="spinner"></div><h3>กำลังโหลดข้อมูล...</h3><p>ดึงข้อมูลจาก Google Sheet</p></div>';
  document.getElementById('countDisplay').textContent = '…';
}
function showError(msg) {
  document.getElementById('grid').innerHTML =
    '<div class="state-box"><div class="icon">⚠️</div><h3>โหลดข้อมูลไม่สำเร็จ</h3><p>' + msg + '</p></div>';
  document.getElementById('countDisplay').textContent = '!';
}

// ─── DETAIL MODAL ─────────────────────────────────────────
function openDetail(p) {
  var photoEl = document.getElementById('dPhoto');
  if (p.thumb) {
    // ★ FIX: ใช้ lh3.googleusercontent.com + fallback
    photoEl.innerHTML =
      '<img src="' + photoUrl(p.thumb, 800) + '" alt="' + (p.project||'') + '" ' +
           'onerror="onModalPhotoError(this,\'' + p.thumb + '\')">' +
      '<span class="modal-photo-badge ' + badgeClass(p.type) + '">' + (p.type||'') + '</span>';
  } else {
    photoEl.innerHTML =
      '<div class="modal-photo-placeholder"><span class="ph-icon">🏠</span><span>ยังไม่มีรูปภาพ</span></div>' +
      '<span class="modal-photo-badge ' + badgeClass(p.type) + '">' + (p.type||'') + '</span>';
  }

  document.getElementById('dProject').textContent  = p.project  || '–';
  document.getElementById('dSub').textContent      = (p.code||'') + (p.location ? ' · 📍 ' + p.location : '');
  document.getElementById('dPrice').textContent    = fmtPrice(p.price);
  document.getElementById('dLocation').textContent = p.location || '–';
  document.getElementById('dType').textContent     = typeEmoji(p.type);
  document.getElementById('dBed').textContent      = (p.bedroom||'–')  + ' ห้อง';
  document.getElementById('dBath').textContent     = (p.bathroom||'–') + ' ห้อง';
  document.getElementById('dPet').textContent      = petLabel(p.pet);
  document.getElementById('dCode').textContent     = p.code || '–';

  document.getElementById('detailOverlay').classList.add('open');
  var modal = document.querySelector('.modal');
  if (modal) modal.scrollTop = 0;
}

function onModalPhotoError(img, fallbackId) {
  if (!img.dataset.fallbackTried && fallbackId) {
    img.dataset.fallbackTried = '1';
    img.src = photoUrlFallback(fallbackId);
    return;
  }
  img.parentElement.innerHTML =
    '<div class="modal-photo-placeholder"><span class="ph-icon">🏠</span><span>ไม่มีรูปภาพ</span></div>';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
});

// ─── TOAST ─────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.classList.remove('show'); }, 2800);
}
</script>
</body>
</html>
